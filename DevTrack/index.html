<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevTrack</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div>
        <h1>DevTrack <span id='task-count'></span></h1>
        <p id="today-date"></p>
      </div>
      <button id='export-csv-btn'>Export CSV</button>
    </header>
    <main class="dashboard-grid">
      <section id="tasks-section" class="card" aria-label="Tasks">
        <h2>Today's Tasks</h2>
        <div class="task-controls">
          <input id='task-input' placeholder='Add a task...' />
          <button id='add-task-btn'>Add</button>
        </div>
        <ul id='task-list'></ul>
      </section>
      <section id="timer-section" class="card" aria-label="Focus Timer">
        <h2>Focus Timer</h2>
        <div id='timer-display'>00:00:00</div>
        <div class="timer-controls">
          <button id='timer-start-btn'>Start</button>
          <button id='timer-stop-btn'>Stop</button>
          <button id='timer-reset-btn'>Reset</button>
        </div>
        <p id='session-count'>Sessions today: 0</p>
      </section>
      <section id="stats-section" class="card" aria-label="Stats">
        <h2>Stats</h2>
      </section>
    </main>
    <footer class="app-footer">Built with Git</footer>
  </div>
  <script src="main.js"></script>
</body>
</html>
