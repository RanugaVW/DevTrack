<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevTrack</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div>
        <h1>DevTrack</h1>
        <p id="today-date"></p>
      </div>
    </header>
    <main class="dashboard-grid">
      <section id="tasks-section" class="card" aria-label="Tasks">
        <h2>Tasks</h2>
      </section>
      <section id="timer-section" class="card" aria-label="Focus Timer">
        <h2>Focus Timer</h2>
      </section>
      <section id="stats-section" class="card" aria-label="Stats">
        <h2>Stats</h2>
      </section>
    </main>
    <footer class="app-footer">Built with Git</footer>
  </div>
  <script src="main.js"></script>
</body>
</html>
